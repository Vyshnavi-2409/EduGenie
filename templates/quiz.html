<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Generator</title>

    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>

<div class="chat-wrapper">

    <h1>📝 Quiz Generator</h1>

    <p>Upload a PDF and generate AI-powered quiz questions instantly.</p>

    <form action="/generate-quiz" method="post" enctype="multipart/form-data" class="pdf-form">

        <input
            type="file"
            name="pdf"
            accept=".pdf"
            required>

        <button type="submit" class="pdf-btn">
            Generate Quiz
        </button>

    </form>

    {% if quiz %}
    <div class="ai-response">
        {{ quiz | safe }}
    </div>
    {% endif %}

</div>

</body>
</html>
