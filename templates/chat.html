<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGenie AI Chat</title>

    <link rel="stylesheet" href="{{url_for('static', path='style.css')}}">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="chat-wrapper">
<div class="top-bar">

    <a href="/" class="home-btn">
        🏠 Home
    </a>

</div>

    <h1>🤖 EduGenie AI Chat</h1>
    <p>Ask anything and get AI-powered answers instantly.</p>

    <div class="chat-box">

    {% if question %}
    <div class="message user">
        <strong>You</strong><br>
        {{ question }}
    </div>
    {% endif %}

    {% if answer %}
    <div class="message ai">
        <div class="chat-header">
            <i class="fa-solid fa-robot"></i>
            <strong>EduGenie AI</strong>
        </div>
        {{ answer | safe }}
    </div>
    {% else %}
    <div class="message ai">
        <div class="chat-header">
            <i class=""fa-solid fa-robat"></i>
            <strong>EduGenie AI</strong>
        </div>
        👋 Hello! Ask me anything about your studies.
    </div>
    {% endif %}

</div>

    <form action="/ask" method="post" class="chat-form">

        <input
            type="text"
            name="question"
            placeholder="Ask your question..."
            required>

        <button type="submit">
            <i class="fa-solid fa-paper-plane"></i>
        </button>

    </form>

</div>
<script>

const form=document.querySelector(".chat-form");
form.addEventListener("submit",function(){
const btn=form.querySelector("button");
btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i>';
btn.disabled=true;

});

</script>
</body>
</html>
